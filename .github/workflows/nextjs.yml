name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 🔥 FORCE CLEAN BUILD (prevents stale out/)
      - name: Clean previous builds
        run: rm -rf .next out

      # 🔥 Build static export
      - name: Build Next.js site
        run: npm run build

      # 🔍 VERIFY output exists (THIS SAVES YOU DEBUGGING TIME)
      - name: Verify export output
        run: |
          echo "Checking out folder..."
          ls -R out || (echo "❌ ERROR: out folder missing" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
